# render.yaml — Blueprint for Render.com deployment
services:
  - type: web
    name: cleanwave-api
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      apt-get update && apt-get install -y ffmpeg
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    envVars:
      - key: WHISPER_MODEL
        value: tiny
      - key: PYTHON_VERSION
        value: "3.11.6"
    healthCheckPath: /api/health
